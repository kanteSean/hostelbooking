<!DOCTYPE html>
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>Hostel System - Student Login</title>

<style type="text/css">

body {
    font-family: Arial, sans-serif;
    background-color: #f0f8ff;
    margin: 0;
    padding: 0;
}

header {
    background-color: #2A3F00;
    color: white;
    padding: 20px 0;
    text-align: center;
}

.login-container {
    display: flex;
    justify-content: center;
    align-items: center;
    padding-top: 60px;
}

.login-card {
    background-color: #CCFFFF;
    padding: 40px;
    border-radius: 10px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    width: 350px;
    border-top: 5px solid #2A3F00;
}

.login-card h2 {
    color: #2A3F00;
    text-align: center;
    margin-bottom: 25px;
}

.form-group {
    margin-bottom: 20px;
}

.form-group label {
    display: block;
    color: #2A1F00;
    margin-bottom: 8px;
    font-weight: bold;
}

.form-group input {
    width: 100%;
    padding: 12px;
    border: 1px solid #ccc;
    border-radius: 5px;
    box-sizing: border-box;
}

input[type="submit"] {
    width: 100%;
    background-color: #2A3F00;
    color: white;
    border: none;
    padding: 12px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 16px;
    font-weight: bold;
    transition: background 0.3s;
}

input[type="submit"]:hover {
    background-color: #405d00;
}

.footer-text {
    text-align: center;
    margin-top: 15px;
    font-size: 14px;
    color: #2A3F00;
}

</style>
</head>

<body>

<header>
    <h1>Hostel Booking System</h1>
    <p>Student Portal Access</p>
</header>

<div class="login-container">

    <div class="login-card">

        <h2>Student Login</h2>

        <form id="loginForm" name="loginForm" method="post" action="student_dashboard_v2.php">

            <div class="form-group">
                <label>Student Number</label>
                <input type="text" name="student_no" required placeholder="e.g. 21/U/1234" />
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required placeholder="Enter your password" />
            </div>

            <input type="submit" name="Submit" value="Login" />

            <div class="footer-text">
                <p>Forgot password? Contact the Warden.</p>
            </div>

        </form>

    </div>

</div>

</body>
</html>
